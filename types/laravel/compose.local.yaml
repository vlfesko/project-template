services:
  # No host port is published for db — connect from the host with `bin/mysql`
  # (runs `docker compose exec db`). This keeps the port free for parallel projects.

  db_test:
    image: wodby/mariadb:${MARIADB_VERSION}
    environment:
      MYSQL_DATABASE: ${X_DB_TEST_DATABASE}
      MYSQL_USER: ${X_DB_USERNAME}
      MYSQL_PASSWORD: ${X_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${X_DB_ROOT_PASSWORD}
    networks: [app]

  mailpit:
    image: axllent/mailpit:latest
    networks: [app]

  # Vite dev server — reachable at https://${X_VITE_DOMAIN} through the shared
  # local Traefik. No host port, so HMR never collides across parallel projects.
  # Requires matching server.hmr config in the app's vite.config.js — see README.
  node:
    environment:
      # Exposed to vite.config.js so the dev server / HMR advertise the Traefik host.
      VITE_DOMAIN: ${X_VITE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-vite-http.rule=Host(`${X_VITE_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-vite-http.entrypoints=web"
      - "traefik.http.routers.${PROJECT_NAME}-vite-https.rule=Host(`${X_VITE_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-vite-https.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-vite-https.tls=true"
      - "traefik.http.services.${PROJECT_NAME}-vite.loadbalancer.server.port=5173"
    networks:
      - proxy

  web:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-web-http.rule=Host(`${X_APP_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-web-http.entrypoints=web"
      - "traefik.http.routers.${PROJECT_NAME}-web-https.rule=Host(`${X_APP_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-web-https.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT_NAME}-web-https.tls=true"
      - "traefik.http.services.${PROJECT_NAME}-web.loadbalancer.server.port=80"
    networks:
      - proxy

  pma:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${PROJECT_NAME}-pma-http.rule=Host(`${X_PMA_DOMAIN}`)"
      - "traefik.http.routers.${PROJECT_NAME}-pma-http.entrypoints=web"
      - "traefik.http.services.${PROJECT_NAME}-pma.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true
